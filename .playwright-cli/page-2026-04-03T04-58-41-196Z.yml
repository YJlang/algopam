      - generic [ref=e52]: "왜 이렇게 되는지도 같이 보면 명확하다. - 가장 큰 비용은 적들의 공격력을 정렬하는 단계다. - 정렬에 `O(N log N)`이 걸린다. - 이후 한 번 순회하면서 흡수 여부를 확인하는 부분은 `O(N)`이다. - 따라서 전체 시간 복잡도는 정렬이 지배하므로 `O(N log N)`이 된다. 추가로 원래 코드의 `pop(0)`은 리스트 맨 앞 삭제라서 `O(N)`이지만, 이 역시 정렬 비용보다 작아서 전체 복잡도는 그대로 `O(N log N)`이다. ## 이번 문제에서 배운 점 - 전투 순서를 직접 시뮬레이션하기보다, “어떤 순서가 가장 유리한가”를 먼저 생각하는 게 중요하다. - 현재 이길 수 있는 적 중 가장 약한 적부터 처리하는 그리디가 자연스럽게 성립한다. - 그리디 문제는 단순히 “정렬해서 한다”가 아니라, **왜 그 선택이 손해가 아닌지**를 설명할 수 있어야 더 탄탄하게 이해한 것이다. 이번 문제는 구현 자체는 짧았지만, 그리디 정당성을 한 번 더 점검하기 좋은 문제였다. ## 마무리 처음 작성한 코드도 핵심 아이디어를 잘 잡고 있어서 충분히 좋은 풀이였다. 다만 다시 정리해보면서, - 왜 정렬이 필요한지 - 왜 가장 약한 적부터 처리해야 하는지 - 비교를 왜 `>`로 해야 하는지 까지 같이 적어두니 훨씬 더 또렷하게 남는 느낌이었다."
